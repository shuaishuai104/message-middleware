# ================================================
# RocketMQ Consumer 配置文件
# ================================================
# 完整配置说明文档：https://rocketmq.apache.org/docs/configuration/
# ================================================

server:
  port: 8080  # 应用端口

rocketmq:
  name-server: localhost:9876  # RocketMQ NameServer 地址

spring:
  application:
    name: rocketmq-consumer  # 应用名称，用于生成消费者组ID

  rocketmq:
    # ================================================
    # NameServer 配置（必填）
    # ================================================
    # NameServer 地址，类似 Kafka 的 Bootstrap Servers
    # 生产者和消费者都需要配置 NameServer 地址来发现 Broker
    #
    # 单节点：localhost:9876
    # 集群模式：node1:9876;node2:9876;node3:9876
    #
    # 何时配置：
    # - 开发环境：单机部署，配置本地地址
    # - 生产环境：集群部署，配置多个 NameServer 地址（用分号;分隔）
    name-server: localhost:9876

    consumer:
      # ================================================
      # 消费者组（必填）
      # ================================================
      # 消费者所属的组
      # CLUSTERING 模式下：同一消费者组内，一条消息只被一个消费者消费
      # BROADCASTING 模式下：每条消息会被所有消费者消费
      #
      # 何时配置：
      # - 必须配置，用于消费者负载均衡
      # - 同一业务模块的消费者应使用相同的 group
      group: ${spring.application.name}-group

      # ================================================
      # 消费线程数 - 最小
      # ================================================
      # 消费者最小线程数
      #
      # 建议值：
      # - 普通场景：10~20
      # - 高并发场景：20~50
      # - 低配机器：5~10
      #
      # 何时调大：
      # - 消息量大，需要高吞吐
      # - 业务处理逻辑较轻（不需要很多等待）
      # - CPU 资源充足
      consume-thread-min: 10

      # ================================================
      # 消费线程数 - 最大
      # ================================================
      # 消费者最大线程数
      #
      # 建议值：
      # - 普通场景：20~30
      # - 高吞吐场景：50~100
      # - 理论上最大线程数应 = 队列数 × 消费者实例数
      #
      # 注意事项：
      # - 线程数过多会消耗过多资源
      # - 应该与 consume-thread-min 保持合理比例
      # - 建议 min : max = 1 : 2 或 1 : 3
      consume-thread-max: 20

      # ================================================
      # 拉取批量大小
      # ================================================
      # 每次拉取消息的最大数量
      #
      # 建议值：
      # - 低配置机器：10~32
      # - 普通机器：32~64
      # - 高性能机器：64~128
      #
      # 何时调大：
      # - 业务处理逻辑简单，速度快
      # - 消息体较小
      # - 需要高吞吐
      #
      # 何时调小：
      # - 业务处理逻辑复杂，耗时长
      # - 消息体较大
      # - 内存有限
      pull-batch-size: 32

      # ================================================
      # 自动提交间隔
      # ================================================
      # 消费进度自动提交的间隔时间（毫秒）
      #
      # 建议值：
      # - 高可靠性：100~500
      # - 普通场景：1000~5000
      # - 高吞吐场景：5000~10000
      #
      # 何时调小：
      # - 对可靠性要求高，消息不能丢
      # - 希望消费进度更频繁保存
      #
      # 何时调大：
      # - 消息量大，希望减少提交频率
      # - 对轻微消息丢失可接受
      auto-commit-interval: 1000

      # ================================================
      # 最大重试次数
      # ================================================
      # 消息消费失败后的最大重试次数
      #
      # 建议值：
      # - 普通场景：3~5
      # - 高可靠场景：10~16
      # - 订单/支付等核心场景：16~20
      #
      # 注意事项：
      # - 超过最大重试次数后，消息会进入死信队列（DLQ）
      # - 如果没有配置 DLQ，消息将被丢弃
      # - RocketMQ 默认最大重试次数为 16
      max-retry-times: 3

      # ================================================
      # 重试间隔
      # ================================================
      # 消息重试的间隔时间（毫秒）
      #
      # 建议值：
      # - 快速失败场景：500~1000
      # - 普通场景：1000~3000
      # - 避免重试风暴：3000~5000
      #
      # 何时调大：
      # - 业务处理依赖外部系统（防止雪崩）
      # - 避免重试造成系统压力
      retry-interval: 1000

      # ================================================
      # 顺序消费失败挂起时间
      # ================================================
      # 顺序消费模式下，单条消息消费失败后挂起的时间（毫秒）
      # 仅在 consume-mode 为 ORDERLY 时生效
      #
      # 建议值：
      # - 敏感业务：1000~3000
      # - 普通顺序消息：3000~5000
      #
      # 何时调大：
      # - 顺序消息处理依赖外部资源
      # - 避免频繁重试造成死循环
      #
      # 注意：顺序消费模式下，重试不会跳过消息，而是等待处理成功
      suspend-current-party-time: 3000

# ================================================
# 应用自定义配置
# ================================================
app:
  consumer:
    # 订阅的 Topic 列表
    # 注意：Topic 需要在 RocketMQ 中创建并配置好权限
    topics:
      - test-topic

# ================================================
# 日志配置
# ================================================
logging:
  level:
    # 应用日志级别
    com.lss.rocketmq_consumer: DEBUG
    # RocketMQ 客户端日志
    # 生产环境建议改为 INFO 减少日志量
    org.apache.rocketmq: INFO
