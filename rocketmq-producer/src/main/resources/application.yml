# ================================================
# RocketMQ Producer 配置文件
# ================================================
# 完整配置说明文档：https://rocketmq.apache.org/docs/configuration/
# ================================================

server:
  port: 8081  # 应用端口

rocketmq:
  name-server: localhost:9876  # RocketMQ NameServer 地址

spring:
  application:
    name: rocketmq-producer  # 应用名称，用于生成消费者组ID等

  rocketmq:
    # ================================================
    # NameServer 配置（必填）
    # ================================================
    # NameServer 地址，类似 Kafka 的 Bootstrap Servers
    # 生产者和消费者都需要配置 NameServer 地址来发现 Broker
    #
    # 单节点：localhost:9876
    # 集群模式：node1:9876;node2:9876;node3:9876
    #
    # 何时配置：
    # - 开发环境：单机部署，配置本地地址
    # - 生产环境：集群部署，配置多个 NameServer 地址（用分号;分隔）
    name-server: localhost:9876

    producer:
      # ================================================
      # 生产者组（必填）
      # ================================================
      # Producer 所属的组，用于事务消息管理
      # 事务消息必须配置 group，非事务消息可选
      #
      # 何时配置：
      # - 事务消息：必须配置，用于 Broker 识别事务生产者
      # - 普通消息：可以不配置，默认使用 spring.application.name
      group: ${spring.application.name}-group

      # ================================================
      # 发送超时时间
      # ================================================
      # 发送消息的超时时间，超过则放弃发送
      #
      # 建议值：
      # - 低延迟场景：5000~10000（5~10秒）
      # - 普通场景：30000（30秒）
      # - 高可靠场景：60000~120000（1~2分钟）
      #
      # 何时调大：
      # - 网络不稳定时
      # - Broker 负载较高时
      # - 事务消息需要更长确认时间
      send-message-timeout: 30000

      # ================================================
      # 消息压缩阈值
      # ================================================
      # 当消息体大小超过此阈值时启用压缩（单位：字节）
      #
      # 建议值：
      # - 4KB（4096）：适合普通业务消息
      # - 1KB（1024）：消息量大、带宽敏感场景
      # - 关闭压缩：0 或很大的值
      #
      # 何时开启：
      # - 消息体较大（通常 > 4KB）
      # - 网络带宽有限
      # - CPU 资源充足
      # 压缩类型由 Broker 配置，RocketMQ 默认使用 snappy 压缩
      compress-message-body-threshold: 4096

      # ================================================
      # 最大消息大小
      # ================================================
      # 单条消息的最大允许大小（单位：字节）
      #
      # 建议值：
      # - 普通场景：4MB（4194304）
      # - 大消息场景：16MB（16777216）
      # - 注意：Broker 也需要配置 maxMessageSize=同样的值
      #
      # 何时调大：
      # - 发送大消息（图片、文件等）
      # - 消息体包含大量业务数据
      max-message-size: 4194304

      # ================================================
      # 同步发送失败重试次数
      # ================================================
      # 同步发送模式（sendSync）失败时的重试次数
      #
      # 建议值：
      # - 高可靠场景：3~5
      # - 普通场景：2~3
      # - 低可靠场景：0~1（关闭重试）
      #
      # 何时调大：
      # - 对可靠性要求极高（金融、订单等）
      # - Broker 负载不稳定
      # - 网络容易抖动
      # 注意：重试会导致消息乱序（如果需要保序，应使用单向发送+外部排序）
      retry-times-when-send-failed: 3

      # ================================================
      # 异步发送失败重试次数
      # ================================================
      # 异步发送模式（sendAsync）失败时的重试次数
      #
      # 建议值：
      # - 普通场景：2~3
      # - 高可靠场景：与同步相同
      #
      # 何时调大：
      # - 异步消息同样需要高可靠
      # - 与同步发送配合使用同一 Producer 实例
      retry-times-when-send-async-failed: 2

      # ================================================
      # 最大飞行中消息数
      # ================================================
      # 异步发送时，等待确认的最大消息数量
      # 控制并发发送的数量，防止内存溢出
      #
      # 建议值：
      # - 低配置机器：256~512
      # - 普通机器：1024~2048
      # - 高性能机器：4096~8192
      #
      # 何时调小：
      # - 内存有限
      # - 消息体较大
      # - 异步回调处理较慢
      max-in-flight-requests-per-connection: 2048

      # ================================================
      # 消息追踪
      # ================================================
      # 是否开启消息轨迹追踪功能
      # 开启后可以追踪每条消息的生产、消费轨迹
      #
      # 建议值：
      # - 开发测试：true（方便调试）
      # - 生产环境：true（问题排查、审计）
      # - 对性能敏感且不需要追踪：false
      #
      # 何时开启：
      # - 需要消息全链路追踪
      # - 问题排查和审计需求
      # - 配合 RocketMQ Console 使用
      enable-msg-trace: true

      # ================================================
      # 自定义追踪 Topic
      # ================================================
      # 消息追踪数据存储的 Topic
      # 仅在 enable-msg-trace: true 时生效
      #
      # 建议值：
      # - 默认：RMQ_SYS_TRACE_TOPIC
      # - 自定义：使用专用的 Topic 存储追踪数据
      #
      # 何时修改：
      # - 默认 Topic 被删除或配置异常
      # - 需要隔离追踪数据
      customized-trace-topic: my-trace-topic

# ================================================
# 应用自定义配置
# ================================================
app:
  topic:
    # 消息发送的目标 Topic
    # 生产者会向此 Topic 发送消息
    # 注意：此 Topic 需要在 RocketMQ 中创建
    name: test-topic

    # 队列数量（仅供文档参考，RocketMQ Broker 端配置）
    # 建议值：8~16
    # - 队列数决定了并行消费的最大线程数
    # - 队列数越多，并发消费能力越强
    # - 但过多队列会增加 Broker 负载
    queue-num: 8

# ================================================
# 日志配置
# ================================================
logging:
  level:
    # 应用日志级别
    com.lss.rocketmq_producer: DEBUG
    # RocketMQ 客户端日志
    # 生产环境建议改为 INFO 减少日志量
    org.apache.rocketmq: INFO
