spring:
  application:
    name: kafka-consumer
  kafka:
    # ==================== Consumer 基础配置 ====================
    bootstrap-servers: localhost:9092,localhost:9093,localhost:9094

    # 消费者的客户端ID
    # 生产实践：通常设置为 "consumer-${spring.application.name}-${随机数}"
    client-id: consumer-${spring.application.name}

    # ==================== Group 管理 ====================
    # 消费者所属的消费者组ID
    # 相同group.id的消费者组成一个消费组，共同消费一个Topic
    # 生产实践：相同业务的消费者使用相同的group.id
    group-id: ${spring.application.name}-group

    # 消费者组自动分配策略
    # 可选值：range, roundrobin, sticky
    # - range: 按Topic的分区顺序分配给消费者，可能不均匀
    # - roundrobin: 轮询分配，更均匀
    # - sticky: 保持原有的分配，同时尽可能均匀
    # 生产实践推荐：roundrobin 或 sticky
    group-instance-id: ${spring.application.name}-instance-${random.uuid}

    # ==================== Offset 管理 ====================
    # 当没有初始offset或offset无效时，从哪里开始消费
    # 可选值：
    # - earliest: 从最早的消息开始（可能重复消费）
    # - latest: 从最新的消息开始（只消费之后的消息）
    # - none: 如果没有offset则抛出异常
    # 生产实践：
    # - 对数据完整性有要求：earliest
    # - 只关心最新数据：latest
    auto-offset-reset: earliest

    # 是否自动提交offset（自动提交到__consumer_offsets）
    # 生产实践建议：false（使用手动提交），auto-commit不可靠
    enable-auto-commit: false

    # 自动提交offset的时间间隔（毫秒）
    # 只有 enable-auto-commit=true 时生效
    # 生产实践：通常设置为 5000（5秒）
    auto-commit-interval: 5000

    # ==================== 心跳与会话 ====================
    # 心跳间隔（毫秒）- 消费者活跃性检测
    # 必须小于 session.timeout.ms，通常为 1/3
    # 生产实践：通常设置为 3000（3秒）
    heartbeat-interval-ms: 3000

    # 会话超时（毫秒）- 如果超过此时间没有收到心跳，触发rebalance
    # 生产实践：通常设置为 10000-30000（10-30秒）
    # 值太小可能导致频繁rebalance，太大可能导致故障发现延迟
    session-timeout-ms: 10000

    # 最大poll间隔（毫秒）- 处理一批消息的最大时间
    # 如果超过此时间还没调用poll()，会触发rebalance
    # 生产实践：通常设置为 300000-600000（5-10分钟）
    # 需要根据业务处理耗时调整
    max-poll-interval-ms: 300000

    # ==================== 拉取消息配置 ====================
    # 一次poll()返回的最大消息数
    # 生产实践：
    # - 低配置机器：100-500
    # - 高吞吐场景：500-1000
    # 注意：不是绝对的，受max.partition.fetch.bytes限制
    max-poll-records: 500

    # 一次fetch请求从每个分区返回的最大数据量（字节）
    # 生产实践：通常设置为 1048576（1MB）到 5242880（5MB）
    max-partition-fetch-bytes: 1048576

    # fetch请求的最小数据量（字节）
    # 只有当分区数据达到此大小时才返回
    # 设置较大可减少网络请求，但会增加延迟
    fetch-min-size: 1

    # 等待fetch返回的最大时间（毫秒）
    # 即使数据未达到fetch.min.size，等待这么久也会返回
    # 生产实践：通常设置为 500（0.5秒）
    fetch-max-wait: 500

    # ==================== 连接与超时 ====================
    # 连接超时时间（毫秒）
    connect-timeout-ms: 30000

    # 请求超时时间（毫秒）
    request-timeout-ms: 30000

    # ==================== 序列化配置 ====================
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    # 头部反序列化类
    header-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    # ==================== 消费者并发配置 ====================
    # 消费者的线程数（每个实例）
    # 生产实践：
    # - 每个线程消费一个分区，设置值应 <= Topic的分区数
    # - 过多线程会导致空闲线程浪费
    concurrency: 3

    # ==================== 事务配置 ====================
    # 事务隔离级别
    # 可选值：read_uncommitted, read_committed
    # - read_uncommitted: 读取所有消息，包括未提交事务的消息
    # - read_committed: 只读取已提交事务的消息
    # 生产实践推荐：read_committed（保证数据一致性）
    isolation-level: read_committed

    # ==================== 偏移量主题配置 ====================
    # 偏移量提交超时时间
    offset-commit-timeout-ms: 5000

    # 是否自动创建消费组相关的Topic
    # 生产实践：建议 false
    enable-auto-create-topics: false

    # ==================== 拦截器配置 ====================
    # 消费者拦截器类，多个用逗号分隔
    # interceptor-classes: com.lss.consumer.interceptor.CustomConsumerInterceptor

    # ==================== 指标配置 ====================
    # 指标记录级别：INFO, DEBUG, TRACE
    # 生产实践：INFO，调试时可开启DEBUG
    # metrics-recording-level: INFO

# ==================== 业务配置 ====================
app:
  consumer:
    # 订阅的主题（支持正则匹配多个主题）
    topics:
      - test-topic
      # - test-.*  # 支持正则表达式匹配
    # 消费模式：single（单条消费）、batch（批量消费）
    mode: single
    # 批量消费时的最大批次大小
    batch-size: 100

# 服务端口
server:
  port: 8080
